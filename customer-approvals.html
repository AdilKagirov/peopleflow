<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMF PeopleFlow · Кабинет заказчика</title>
    <link rel="stylesheet" href="approval-portal.css" />
  </head>
  <body data-approval-type="customer">
    <header class="portal-header">
      <div class="portal-brand">
        <span class="brand-mark">K</span>
        <div>
          <strong>KMF PeopleFlow</strong>
          <span>Кабинет заказчика</span>
        </div>
      </div>
      <a class="back-link" href="./peopleflow.html">Вернуться в ATS</a>
    </header>

    <main class="portal-main">
      <section class="portal-intro">
        <div>
          <p class="eyebrow">Согласование кандидатов</p>
          <h1>Очередь заказчика</h1>
          <p>Рассмотрите профиль кандидата и примите решение о приглашении на интервью.</p>
        </div>
        <div class="connection-status" id="connectionStatus">Подключение...</div>
      </section>

      <section class="summary-grid" id="summary"></section>

      <section class="queue-panel">
        <div class="queue-toolbar">
          <div class="segmented" role="group" aria-label="Фильтр статуса">
            <button class="segment active" data-status="pending">Ожидают</button>
            <button class="segment" data-status="approved">Одобрены</button>
            <button class="segment" data-status="rejected">Отклонены</button>
            <button class="segment" data-status="">Все</button>
          </div>
          <button class="secondary" id="refreshButton">Обновить</button>
        </div>
        <div class="approval-list" id="approvalList"></div>
      </section>
    </main>

    <dialog id="decisionDialog">
      <form id="decisionForm">
        <div class="dialog-head">
          <div>
            <p class="eyebrow" id="decisionType"></p>
            <h2 id="decisionCandidate"></h2>
          </div>
          <button type="button" class="icon-button" id="closeDialog" aria-label="Закрыть">×</button>
        </div>
        <label class="comment-field">
          <span>Комментарий к решению</span>
          <textarea id="decisionComment" required placeholder="Укажите основание решения"></textarea>
        </label>
        <div class="dialog-actions">
          <button type="button" class="secondary" id="cancelDecision">Отмена</button>
          <button type="submit" class="primary" id="confirmDecision">Сохранить решение</button>
        </div>
      </form>
    </dialog>

    <dialog id="documentsDialog">
      <div class="documents-modal">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Файлы кандидата</p>
            <h2 id="documentsCandidate"></h2>
          </div>
          <button type="button" class="icon-button" id="closeDocuments" aria-label="Закрыть">×</button>
        </div>
        <div id="documentsBody" class="documents-body"></div>
        <div class="dialog-actions">
          <button type="button" class="secondary" id="closeDocumentsFooter">Закрыть</button>
        </div>
      </div>
    </dialog>

    <script src="approval-portal.js"></script>
  </body>
</html>
